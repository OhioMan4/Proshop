apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce
  namespace: argocd

  annotations:
    argocd-image-updater.argoproj.io/image-list: backend=chywiz/e-app-backend
    argocd-image-updater.argoproj.io/backend.update-strategy: latest

spec:
  project: default

  source:
    repoURL: https://github.com/OhioMan4/Proshop.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
