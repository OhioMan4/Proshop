version: "3"

services:

  backend:
    image: chywiz/e-app-backend
    restart: always
    env_file: 
      - ./backend/.env.prod
    depends_on:
      - mongo
    expose:
      - "5000"

  frontend:
    image: chywiz/e-app-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
