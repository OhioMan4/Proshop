name: CI-CD Deploy to E-app into EC2

on:
  push:
    branches:
      - main



env:
  DOCKER_BACKEND: chywiz/e-app-backend
  DOCKER_FRONTEND: chywiz/e-app-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node 
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend image
        run: docker build -t $DOCKER_BACKEND:latest ./backend

      - name: Push backend image
        run: docker push $DOCKER_BACKEND:latest

      - name: Build frontend image
        run: docker build -t $DOCKER_FRONTEND:latest ./frontend

      - name: Push frontend image
        run: docker push $DOCKER_FRONTEND:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ID }}:oidc-provider/token.actions.githubusercontent.com
          aws-region: ap-southeast-2

      - name: Test AWS Access
        run: aws sts get-caller-identity