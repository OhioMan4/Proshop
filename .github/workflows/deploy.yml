name: CI-CD Deploy to E-app into EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'

permissions:
  contents: write



env:
  DOCKER_BACKEND: chywiz/e-app-backend
  DOCKER_FRONTEND: chywiz/e-app-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKER_BACKEND }}:${{ github.sha }}

      - name: Build and push frontend image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKER_FRONTEND }}:${{ github.sha }}

      - name: Update k8s image tags
        run: |
          sed -i "s|chywiz/e-app-frontend:.*|chywiz/e-app-frontend:${{ github.sha }}|g" k8s/frontend/frontend-deployment.yaml
          sed -i "s|chywiz/e-app-backend:.*|chywiz/e-app-backend:${{ github.sha }}|g" k8s/backend/backend-deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/frontend/frontend-deployment.yaml k8s/backend/backend-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push


