name: CI-CD Deploy to E-app into EC2

on:
  push:
    branches:
      - main

env:
  DOCKER_BACKEND: chywiz/e-app-backend
  DOCKER_FRONTEND: chywiz/e-app-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node 
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend image
        run: docker build -t $DOCKER_BACKEND:latest ./backend

      - name: Push backend image
        run: docker push $DOCKER_BACKEND:latest

      - name: Build frontend image
        run: docker build -t $DOCKER_FRONTEND:latest ./frontend

      - name: Push frontend image
        run: docker push $DOCKER_FRONTEND:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/your-project-folder
            docker pull $DOCKER_BACKEND:latest
            docker pull $DOCKER_FRONTEND:latest
            docker compose down
            docker compose up -d

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::211048956042:oidc-provider/github
          aws-region: ap-southeast-2

      - name: Test AWS Access
        run: aws sts get-caller-identity